<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 沙雕一家的VIP视频</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px 25px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            text-align: center;
            color: #333;
            font-size: 26px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            color: #555;
            font-size: 14px;
            margin-bottom: 6px;
            font-weight: 500;
        }

        .input-box {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .input-box:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .api-select {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            background: #fafafa;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .api-select:focus {
            outline: none;
            border-color: #667eea;
            background: #fff;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-play {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-play:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-clear {
            background: #f0f0f0;
            color: #555;
        }

        .btn-clear:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .platform-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .platform-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .iqiyi { background: linear-gradient(135deg, #ff6b6b, #ee5a52); }
        .tencent { background: linear-gradient(135deg, #4facfe, #00f2fe); }
        .youku { background: linear-gradient(135deg, #43e97b, #38f9d7); }

        .platform-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .tip {
            text-align: center;
            color: #999;
            font-size: 12px;
            line-height: 1.5;
        }

        .tip strong {
            color: #667eea;
        }

        /* 手机适配优化 */
        @media (max-width: 480px) {
            .container {
                padding: 25px 20px;
                border-radius: 16px;
            }
            h1 {
                font-size: 23px;
            }
            .btn-group {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 沙雕一家的VIP视频</h1>
        <p class="subtitle">多接口兜底 · 一键解析 · 全平台通用</p>

        <div class="form-group">
            <label for="apiSelect">选择解析接口</label>
            <select id="apiSelect" class="api-select">
                <option value="https://jx.xmflv.cc/?url=">✅ 接口1：xmflv（稳定优先）</option>
                <option value="https://jx.hls.one/?url=">🔄 接口2：hls.one（备用）</option>
                <option value="https://jx.2s0.cn/player/?url=">🔄 接口3：2s0（备用）</option>
                <option value="https://jx.nnxv.cn/tv.php?url=">🔄 接口4：nnxv（备用）</option>
            </select>
        </div>

        <div class="form-group">
            <label for="videoLink">粘贴视频链接</label>
            <input type="text" id="videoLink" class="input-box" placeholder="粘贴爱奇艺/腾讯/优酷视频链接...">
        </div>

        <div class="btn-group">
            <button class="btn btn-play" onclick="playVideo()">▶️ 立即播放</button>
            <button class="btn btn-clear" onclick="clearInput()">🗑️ 清空</button>
        </div>

        <div class="platform-group">
            <button class="platform-btn iqiyi" onclick="openIqiyi()">爱奇艺</button>
            <button class="platform-btn tencent" onclick="openTencent()">腾讯视频</button>
            <button class="platform-btn youku" onclick="openYouku()">优酷</button>
        </div>

        <p class="tip">
            💡 提示：一个接口打不开，<strong>切换其他接口重试</strong>
            <br>支持爱奇艺/腾讯/优酷等主流平台，手机/电脑通用
        </p>
    </div>

    <script>
        // 2026.4实测可用解析接口
        const APIS = {
            "https://jx.xmflv.cc/?url=": "xmflv",
            "https://jx.hls.one/?url=": "hls.one",
            "https://jx.2s0.cn/player/?url=": "2s0",
            "https://jx.nnxv.cn/tv.php?url=": "nnxv"
        };

        // 播放逻辑
        function playVideo() {
            const linkInput = document.getElementById("videoLink");
            const apiSelect = document.getElementById("apiSelect");
            
            const videoUrl = linkInput.value.trim();
            const selectedApi = apiSelect.value;

            if (!videoUrl) {
                alert("❌ 请先粘贴视频链接！");
                return;
            }

            const fullUrl = selectedApi + videoUrl;
            window.open(fullUrl, "_blank");
        }

        // 清空输入
        function clearInput() {
            document.getElementById("videoLink").value = "";
        }

        // 平台快捷打开
        function openIqiyi() { window.open("https://www.iqiyi.com", "_blank"); }
        function openTencent() { window.open("https://v.qq.com", "_blank"); }
        function openYouku() { window.open("https://www.youku.com", "_blank"); }

        // 回车触发播放
        document.getElementById("videoLink").addEventListener("keypress", function(e) {
            if (e.key === "Enter") playVideo();
        });
    </script>
</body>
</html>
